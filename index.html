<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Shop quality products online - Fast delivery across Algeria">
  <meta name="theme-color" content="#1e40af">
  <!-- Security Headers -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
  <!-- EDIT META TAGS BELOW -->
  <meta property="og:title" content="My Store - Quality Products">
  <meta property="og:description" content="Shop quality products online - Fast delivery across Algeria">
  <meta property="og:type" content="website">
  <title>My Store - Quality Products</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Skip to main content link for accessibility -->
  <a href="#products-section" class="skip-link">Skip to main content</a>
  
  <!-- Header -->
  <header class="header">
    <div class="container">
      <a href="#" class="logo-link" onclick="event.preventDefault(); window.scrollTo({top: 0, behavior: 'smooth'});" aria-label="Go to homepage">
        <h1 class="logo" id="store-name">My Store</h1>
      </a>
      <nav class="header-nav" aria-label="Main navigation">
        <a href="#products-section" class="nav-link">Shop</a>
        <button class="cart-icon-btn" onclick="openCart()" aria-label="Open cart" aria-expanded="false" id="cart-button">
          <svg class="cart-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M9 2L7 6H2v14h18V6h-5L13 2H9z"/>
            <circle cx="7" cy="20" r="1"/>
            <circle cx="17" cy="20" r="1"/>
          </svg>
          <span class="cart-count-badge" id="cart-count" style="display: none;" aria-live="polite">0</span>
        </button>
      </nav>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <div class="container">
      <h2 class="hero-title">Premium Quality Clothing</h2>
      <p class="hero-subtitle">Shop the latest styles with fast delivery across Algeria</p>
      <div class="hero-cta-group">
        <button class="btn btn-primary btn-large" onclick="document.getElementById('products-section').scrollIntoView({ behavior: 'smooth' })" aria-label="Browse our products">
          Shop Now
        </button>
        <button class="btn btn-secondary btn-large" onclick="openCart()" aria-label="View your cart">
          View Cart
        </button>
      </div>
    </div>
  </section>

  <!-- Products Section -->
  <section id="products-section" class="products-section">
    <div class="container">
      <h2 class="section-title">Our Products</h2>
      
      <!-- Search & Filters -->
      <div class="filters-container">
        <div class="search-box">
          <input 
            type="text" 
            id="search-input" 
            placeholder="Search products..." 
            aria-label="Search products"
            oninput="debouncedSearch(event)"
          >
        </div>
        
        <div class="filters-grid">
          <div class="filter-group">
            <label for="filter-tag">Category</label>
            <select id="filter-tag" onchange="handleFilterChange()">
              <option value="">All Categories</option>
            </select>
          </div>
          
          <div class="filter-group">
            <label for="filter-size">Size</label>
            <select id="filter-size" onchange="handleFilterChange()">
              <option value="">All Sizes</option>
            </select>
          </div>
          
          <div class="filter-group">
            <label for="filter-price-min">Min Price</label>
            <input type="number" id="filter-price-min" placeholder="Min" onchange="handleFilterChange()">
          </div>
          
          <div class="filter-group">
            <label for="filter-price-max">Max Price</label>
            <input type="number" id="filter-price-max" placeholder="Max" onchange="handleFilterChange()">
          </div>
        </div>
        
        <p id="result-count" class="result-count"></p>
      </div>
      
      <!-- Product Grid -->
      <div id="product-grid" class="product-grid">
        <!-- Products rendered dynamically by script.js -->
      </div>
    </div>
  </section>

  <!-- Product Modal -->
  <div id="product-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="product-modal-title" aria-hidden="true">
    <!-- Content rendered dynamically by script.js -->
  </div>

  <!-- Cart Modal -->
  <div id="cart-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="cart-modal-title" aria-hidden="true">
    <div class="modal-content cart-modal-content">
      <button class="modal-close" onclick="closeCart()" aria-label="Close cart">×</button>
      <h2 id="cart-modal-title">Your Cart</h2>
      
      <div id="cart-items" class="cart-items">
        <!-- Cart items rendered dynamically -->
      </div>
      
      <div class="cart-summary">
        <div class="cart-summary-row">
          <span>Subtotal:</span>
          <span id="cart-subtotal">0 DZD</span>
        </div>
        <div class="cart-summary-row cart-total-row">
          <span>Total:</span>
          <span id="cart-total">0 DZD</span>
        </div>
      </div>
      
      <!-- Checkout Form -->
      <form id="checkout-form" class="checkout-form" onsubmit="handleCheckoutSubmit(event)">
        <h3>Order Information</h3>
        
        <div class="form-row">
          <div class="form-group">
            <label for="checkout-firstname">First Name <span class="required">*</span></label>
            <input 
              type="text" 
              id="checkout-firstname" 
              name="firstName" 
              required 
              autocomplete="given-name"
              aria-required="true"
              aria-invalid="false"
            >
            <span class="error-message" id="error-firstname" role="alert"></span>
          </div>
          
          <div class="form-group">
            <label for="checkout-lastname">Last Name <span class="required">*</span></label>
            <input 
              type="text" 
              id="checkout-lastname" 
              name="lastName" 
              required 
              autocomplete="family-name"
              aria-required="true"
              aria-invalid="false"
            >
            <span class="error-message" id="error-lastname" role="alert"></span>
          </div>
        </div>
        
        <div class="form-group">
          <label for="checkout-email">Email <span class="required">*</span></label>
          <input 
            type="email" 
            id="checkout-email" 
            name="email" 
            required 
            autocomplete="email"
            placeholder="example@email.com"
            aria-required="true"
            aria-invalid="false"
          >
          <span class="error-message" id="error-email" role="alert"></span>
        </div>
        
        <div class="form-group">
          <label for="checkout-phone">Phone <span class="required">*</span></label>
          <input 
            type="tel" 
            id="checkout-phone" 
            name="phone" 
            required 
            autocomplete="tel"
            placeholder="+2136XXXXXXXX"
            aria-required="true"
            aria-invalid="false"
          >
          <span class="error-message" id="error-phone" role="alert"></span>
        </div>
        
        <div class="form-group">
          <label for="checkout-wilaya">Wilaya <span class="required">*</span></label>
          <select id="checkout-wilaya" name="wilaya" required aria-required="true" aria-invalid="false">
            <option value="">Select wilaya</option>
            <!-- Options populated by script.js -->
          </select>
          <span class="error-message" id="error-wilaya" role="alert"></span>
        </div>
        
        <div class="form-group">
          <label for="checkout-address">Address <span class="required">*</span></label>
          <textarea 
            id="checkout-address" 
            name="address" 
            required 
            autocomplete="street-address"
            placeholder="Street name, building number, city..."
            rows="3"
            aria-required="true"
            aria-invalid="false"
          ></textarea>
          <span class="error-message" id="error-address" role="alert"></span>
        </div>
        
        <div class="form-group">
          <label for="checkout-notes">Notes (Optional)</label>
          <textarea 
            id="checkout-notes" 
            name="notes" 
            autocomplete="off"
            placeholder="Delivery instructions, special requests..."
            rows="2"
            aria-invalid="false"
          ></textarea>
        </div>
        
        <button type="submit" class="btn btn-primary btn-large btn-block">
          Place Order
        </button>
      </form>
    </div>
  </div>

  <!-- Success Modal -->
  <div id="success-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="success-modal-title" aria-hidden="true">
    <!-- Content rendered dynamically by script.js -->
  </div>

  <script src="script.js"></script>
  <script>
    // Populate filter options and store name on load
    document.addEventListener("DOMContentLoaded", function() {
      // Update store name
      const storeNameEl = document.getElementById("store-name");
      if (storeNameEl && typeof CONFIG !== "undefined") {
        storeNameEl.textContent = CONFIG.STORE_NAME;
      }
      
      // Populate category filter
      const tagFilter = document.getElementById("filter-tag");
      if (tagFilter && typeof PRODUCTS !== "undefined") {
        const allTags = [...new Set(PRODUCTS.flatMap(p => p.tags))];
        allTags.forEach(tag => {
          const option = document.createElement("option");
          option.value = tag;
          option.textContent = tag.charAt(0).toUpperCase() + tag.slice(1);
          tagFilter.appendChild(option);
        });
      }
      
      // Populate size filter
      const sizeFilter = document.getElementById("filter-size");
      if (sizeFilter && typeof PRODUCTS !== "undefined") {
        const allSizes = [...new Set(PRODUCTS.flatMap(p => p.sizes || []))];
        allSizes.sort();
        allSizes.forEach(size => {
          const option = document.createElement("option");
          option.value = size;
          option.textContent = size;
          sizeFilter.appendChild(option);
        });
      }
      
      // Populate wilaya dropdown
      const wilayaSelect = document.getElementById("checkout-wilaya");
      if (wilayaSelect && typeof WILAYAS !== "undefined") {
        WILAYAS.forEach(wilaya => {
          const option = document.createElement("option");
          option.value = wilaya;
          option.textContent = wilaya;
          wilayaSelect.appendChild(option);
        });
      }
    });
  </script>
</body>
</html>
